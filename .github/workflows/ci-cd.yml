name: CI-CD
on:
  push:
    branches:
      - main
    paths:
      - 'django-app/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Run deploy job'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: django-app-deployment
  WORKING_DIR: django-app
  APP_DIR: django-app/app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache dependencies
        uses: actions/cache@v5
        id: cache-pip
        with:
            path: ~/.cache/pip
            key: venv-${{ hashFiles('django-app/requirements.txt')}}
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR}}
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: ${{ env.APP_DIR}}
        run: python manage.py test
    
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build -t $IMAGE_URI ${{ env.WORKING_DIR }}
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
      - name: Store image URI 
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh variable set DJANGO_CONTAINER_IMAGE --body "${{ env.IMAGE_URI }}"
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' || inputs.deploy == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: AWS ECS update-service
        run: aws ecs update-service --cluster ${{ vars.ECS_CLUSTER_NAME }} --service ${{ vars.ECS_SERVICE_NAME }} --force-new-deployment
